# OpenClaw + LiteLLM on t3.large (2 vCPU, 8 GB RAM)
# LiteLLM proxies Anthropic API → OpenRouter (cheapest models)

services:

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-openclaw-local}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"   # internal only — not exposed via security group
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  openclaw:
    build: .
    image: openclaw-daatan:local
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    group_add:
      - "999"
    volumes:
      - /home/ubuntu/projects:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/.openclaw:/home/node/.openclaw
      - /home/ubuntu/.ssh/id_github:/home/node/.ssh/id_ed25519:ro
      - /home/ubuntu/.ssh/id_github.pub:/home/node/.ssh/id_ed25519.pub:ro
      - ./backups:/home/node/.openclaw/backups:rw
      - ./config/openclaw-openrouter.json:/home/node/.openclaw/openclaw.json:ro
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openclaw-web-chat-token}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-openclaw-local}
      - NODE_OPTIONS=--max-old-space-size=4096
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "openclaw"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # t3.large: 2 vCPU, 8 GB — leave ~1 GB for OS + LiteLLM
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 6G
        reservations:
          cpus: "0.5"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
