<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #222;
            padding: 16px;
            border-bottom: 1px solid #333;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message.user {
            background: #0084ff;
            align-self: flex-end;
        }
        .message.agent {
            background: #333;
            align-self: flex-start;
        }
        .message.error {
            background: #ff4444;
            align-self: center;
        }
        .input-container {
            padding: 16px;
            border-top: 1px solid #333;
            background: #222;
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #0084ff;
        }
        button {
            padding: 12px 24px;
            background: #0084ff;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background: #0073e6;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            font-size: 12px;
            color: #999;
            padding: 8px 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">🤖 OpenClaw Chat</div>
    <div class="status" id="status">Connecting...</div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message..." disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        let ws = null;
        let sessionId = new URLSearchParams(window.location.search).get('session') || 'default';

        function addMessage(text, type = 'agent') {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateStatus(text, isConnected) {
            status.textContent = text;
            status.style.color = isConnected ? '#0f0' : '#f00';
            messageInput.disabled = !isConnected;
            sendBtn.disabled = !isConnected;
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            console.log('Connecting to:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus('Connected ✓', true);
                addMessage('Connected to OpenClaw. Send a message to chat with agents.', 'agent');
            };

            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    console.log('Received:', data);

                    if (data.response) {
                        addMessage(data.response, 'agent');
                    } else if (data.error) {
                        addMessage(`Error: ${data.error}`, 'error');
                    } else if (data.message) {
                        addMessage(data.message, 'agent');
                    } else {
                        addMessage(JSON.stringify(data), 'agent');
                    }
                } catch (err) {
                    addMessage(`Server: ${e.data}`, 'agent');
                }
            };

            ws.onerror = (e) => {
                console.error('WebSocket error:', e);
                updateStatus('Connection error', false);
                addMessage('Connection error. Retrying...', 'error');
            };

            ws.onclose = () => {
                updateStatus('Disconnected. Reconnecting...', false);
                setTimeout(connect, 3000);
            };
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage(text, 'user');

            try {
                // Send as JSON message
                ws.send(JSON.stringify({
                    type: 'message',
                    content: text,
                    session: sessionId,
                    timestamp: Date.now()
                }));
            } catch (err) {
                // Fallback: send as plain text
                ws.send(text);
            }

            messageInput.value = '';
            messageInput.focus();
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        sendBtn.addEventListener('click', sendMessage);

        // Initial connection
        connect();
    </script>
</body>
</html>
