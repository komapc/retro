server {
    listen 80;
    server_name mission.daatan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name mission.daatan.com;

    ssl_certificate /etc/letsencrypt/live/mission.daatan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mission.daatan.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Auth service endpoints
    location /login {
        proxy_pass http://127.0.0.1:5001/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /verify {
        proxy_pass http://127.0.0.1:5001/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth-success {
        proxy_pass http://127.0.0.1:5001/auth-success;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass http://127.0.0.1:5001/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:5001/health;
        proxy_set_header Host $host;
    }

    # Web chat interface
    location /chat.html {
        root /home/ubuntu/.openclaw;
    }

    # Canvas SPA - serve index.html for all non-asset routes
    location / {
        root /home/ubuntu/.openclaw/canvas;
        try_files $uri /index.html =404;
    }

    # WebSocket endpoint - gateway handles token validation
    location /ws {
        proxy_pass http://127.0.0.1:18789/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer openclaw-web-chat-token";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
