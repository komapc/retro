# oracle.daatan.com — TruthMachine Oracle API
# Deploy on the retro EC2 (not daatan's nginx).
#
# Setup:
#   sudo cp oracle.conf /etc/nginx/sites-available/oracle
#   sudo ln -s /etc/nginx/sites-available/oracle /etc/nginx/sites-enabled/oracle
#   sudo certbot --nginx -d oracle.daatan.com --non-interactive --agree-tos -m admin@daatan.com
#   sudo nginx -t && sudo systemctl reload nginx

upstream oracle_api {
    server 127.0.0.1:8001;
    keepalive 4;
}

# Rate limiting (must be in http context — include this file from within an http{} block)
limit_req_zone $binary_remote_addr zone=oracle_limit:10m rate=60r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name oracle.daatan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://oracle.daatan.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name oracle.daatan.com;

    ssl_certificate     /etc/letsencrypt/live/oracle.daatan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oracle.daatan.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location /health {
        proxy_pass http://oracle_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # CORS — handle preflight here so rate-limiter never blocks OPTIONS
    set $cors_origin "";
    if ($http_origin = "https://komapc.github.io")  { set $cors_origin $http_origin; }
    if ($http_origin ~* "^http://(localhost|127\.0\.0\.1)(:[0-9]+)?$") { set $cors_origin $http_origin; }

    location / {
        # Preflight — respond immediately without hitting uvicorn
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://oracle_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 3s;

        # Inject CORS headers on every proxied response
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;

        limit_req zone=oracle_limit burst=30 nodelay;
        limit_req_status 429;
    }
}
