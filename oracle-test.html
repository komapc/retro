<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oracle — TruthMachine Forecast Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080F1A;
      --surface:   #0E1F35;
      --surface2:  #142843;
      --border:    #1C3452;
      --accent:    #3B82F6;
      --accent-hi: #60A5FA;
      --muted:     #4B6280;
      --text:      #E2E8F0;
      --text-dim:  #8BA3BC;
      --yes:       #22C55E;
      --no:        #EF4444;
      --warn:      #F59E0B;
      --radius:    12px;
      --radius-sm: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────── */
    .layout { display: grid; grid-template-columns: 340px 1fr; min-height: 100vh; }
    @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .logo { display: flex; align-items: center; gap: .6rem; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1rem;
    }
    .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    .logo span { color: var(--text-dim); font-weight: 400; font-size: .85rem; }

    .sidebar-section { display: flex; flex-direction: column; gap: .75rem; }
    .sidebar-label {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted);
    }

    .health-row {
      display: flex; align-items: center; gap: .6rem;
      font-size: .82rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.ok  { background: var(--yes); box-shadow: 0 0 6px var(--yes); }
    .dot.err { background: var(--no); }

    .quick-list { display: flex; flex-direction: column; gap: .4rem; }
    .quick-btn {
      text-align: left;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: .8rem;
      padding: .5rem .75rem;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      line-height: 1.4;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--text); }
    .quick-btn.active { border-color: var(--accent); color: var(--text); background: #11213a; }

    .sidebar-footer { margin-top: auto; font-size: .73rem; color: var(--muted); line-height: 1.5; }
    .sidebar-footer a { color: var(--text-dim); text-decoration: none; }
    .sidebar-footer a:hover { color: var(--accent-hi); }

    /* ── Main panel ─────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
    }

    .question-wrap { flex: 1; position: relative; }
    .question-wrap textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      padding: .6rem .9rem;
      resize: none;
      outline: none;
      transition: border-color .15s;
      line-height: 1.4;
      height: 56px;
      overflow: hidden;
    }
    .question-wrap textarea:focus { border-color: var(--accent); }
    .question-wrap textarea::placeholder { color: var(--muted); }

    .topbar-right { display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }

    .articles-input {
      display: flex; align-items: center; gap: .4rem;
      font-size: .8rem; color: var(--text-dim);
    }
    .articles-input input {
      width: 44px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .8rem;
      padding: .3rem .4rem;
      text-align: center;
      outline: none;
    }
    .articles-input input:focus { border-color: var(--accent); }

    .run-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 600;
      padding: .6rem 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; gap: .45rem;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .run-btn:hover { background: var(--accent-hi); }
    .run-btn:disabled { opacity: .5; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    /* ── Content area ─────────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 2rem; }

    /* ── Empty state ─────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      color: var(--muted);
      gap: 1rem;
      text-align: center;
    }
    .empty-icon { font-size: 3rem; opacity: .3; }
    .empty-state p { font-size: .9rem; line-height: 1.5; max-width: 320px; }
    .kbd {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .1rem .35rem;
      font-size: .75rem;
      font-family: ui-monospace, monospace;
      color: var(--text-dim);
    }

    /* ── Result cards ─────────────────────────────── */
    .result-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 660px) { .result-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .card-label {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* gauge */
    .gauge-wrap { position: relative; width: 180px; height: 100px; margin: 0 auto; }
    .gauge-wrap svg { width: 100%; height: auto; overflow: visible; }
    .gauge-label {
      position: absolute;
      bottom: 4px; left: 0; right: 0;
      text-align: center;
    }
    .gauge-pct { font-size: 2rem; font-weight: 800; line-height: 1; }
    .gauge-sub { font-size: .68rem; color: var(--muted); }

    .verdict {
      text-align: center;
      margin-top: .85rem;
      font-size: .9rem;
      font-weight: 600;
    }

    /* stat row */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-key { color: var(--text-dim); }
    .stat-val { font-weight: 600; }

    /* CI bar */
    .ci-bar-track {
      position: relative; height: 6px;
      background: var(--border);
      border-radius: 99px;
      margin: .5rem 0;
    }
    .ci-bar-fill {
      position: absolute; height: 100%;
      border-radius: 99px;
      background: var(--accent);
      opacity: .4;
    }
    .ci-bar-point {
      position: absolute; width: 3px; height: 100%;
      background: var(--accent-hi);
      border-radius: 99px;
      transform: translateX(-50%);
    }
    .ci-labels { display: flex; justify-content: space-between; font-size: .68rem; color: var(--muted); }

    /* sources */
    .sources-header {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: .75rem;
    }
    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .85rem 1rem;
      margin-bottom: .6rem;
      display: grid;
      grid-template-columns: 3px 1fr;
      gap: 0 .85rem;
    }
    .source-bar { border-radius: 99px; align-self: stretch; min-height: 20px; }
    .source-name { font-weight: 600; font-size: .85rem; }
    .source-url { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .source-url a { color: inherit; text-decoration: none; }
    .source-url a:hover { color: var(--accent-hi); }
    .source-claims {
      margin-top: .4rem;
      font-size: .8rem; color: var(--text-dim);
      list-style: none;
      display: flex; flex-direction: column; gap: .25rem;
    }
    .source-claims li::before { content: "· "; color: var(--muted); }
    .source-chips {
      display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .45rem;
    }
    .chip {
      font-size: .68rem; padding: .15rem .45rem;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .chip.yes { border-color: #166534; color: var(--yes); }
    .chip.no  { border-color: #7f1d1d; color: var(--no); }
    .chip.hi  { border-color: #1e40af; color: var(--accent-hi); }

    /* notice */
    .notice {
      display: flex; align-items: flex-start; gap: .6rem;
      border-radius: var(--radius-sm);
      padding: .7rem 1rem;
      font-size: .82rem;
      margin-bottom: 1rem;
    }
    .notice.warn { background: #1c1500; border: 1px solid #78350f; color: #fbbf24; }
    .notice.info { background: #0c1a2e; border: 1px solid var(--border); color: var(--text-dim); }

    /* error */
    .error-card {
      background: #1a0808; border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      color: #fca5a5; font-size: .85rem;
      line-height: 1.5;
    }

    /* meta footer */
    .result-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .75rem; color: var(--muted);
      margin-top: 1.25rem;
      flex-wrap: wrap; gap: .5rem;
    }

    details { margin-top: 1rem; }
    summary { font-size: .78rem; color: var(--muted); cursor: pointer; user-select: none; }
    summary:hover { color: var(--text-dim); }
    pre {
      margin-top: .5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .85rem 1rem;
      font-size: .73rem;
      overflow-x: auto;
      color: var(--text-dim);
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🔮</div>
      <div>
        <h1>Oracle</h1>
        <span>TruthMachine forecast console</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">API Status</div>
      <div class="health-row">
        <div class="dot" id="health-dot"></div>
        <span id="health-text" style="color:var(--text-dim)">Checking…</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Quick Prompts</div>
      <div class="quick-list" id="quick-list">
        <button class="quick-btn" onclick="setQ(this, 'Will Israel and Hamas reach a permanent ceasefire in 2026?')">Israel–Hamas ceasefire in 2026</button>
        <button class="quick-btn" onclick="setQ(this, 'Will the Israeli coalition government collapse before the end of 2026?')">Israeli coalition collapse</button>
        <button class="quick-btn" onclick="setQ(this, 'Will Iran launch a direct military strike on Israel before the end of 2026?')">Iran strikes Israel</button>
        <button class="quick-btn" onclick="setQ(this, 'Will the US Federal Reserve cut interest rates in 2026?')">Fed rate cut in 2026</button>
        <button class="quick-btn" onclick="setQ(this, 'Will Donald Trump win the 2028 US presidential election?')">Trump wins 2028</button>
        <button class="quick-btn" onclick="setQ(this, 'Will the S&P 500 reach 7000 by end of 2025?')">S&P 500 reaches 7000</button>
        <button class="quick-btn" onclick="setQ(this, 'Will Russia and Ukraine reach a ceasefire agreement in 2026?')">Russia–Ukraine ceasefire</button>
        <button class="quick-btn" onclick="setQ(this, 'Will Bitcoin exceed $200,000 in 2026?')">Bitcoin exceeds $200k</button>
      </div>
    </div>

    <div class="sidebar-footer">
      <div style="margin-bottom:.5rem">
        Powered by <a href="https://github.com/komapc/retro" target="_blank">TruthMachine</a> · Bedrock Nova via IAM
      </div>
      <div>Stance [-1, 1] → Probability [0%, 100%]</div>
      <div style="margin-top:.5rem; color:var(--border)">Rate limited · 10 req/min</div>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <div class="question-wrap">
        <textarea id="question" placeholder="Ask a binary yes/no question…" rows="2"></textarea>
      </div>
      <div class="topbar-right">
        <div class="articles-input">
          <span>Articles</span>
          <input id="max-articles" type="number" value="5" min="1" max="20" />
        </div>
        <button class="run-btn" id="run-btn" onclick="runForecast()">
          <div class="spinner" id="spinner"></div>
          <span id="run-label">Run Forecast</span>
        </button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🔮</div>
        <p>Type a binary yes/no question above, or pick a quick prompt from the sidebar.</p>
        <p><kbd class="kbd">⌘ Enter</kbd> to run</p>
      </div>
      <div id="result-area" style="display:none"></div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://oracle.daatan.com'
  const API_KEY = '9870459c54c22091444f55ac5757966b153021c2478a95aafa47e6510c623a46'

  const $ = id => document.getElementById(id)

  // ── Health check ─────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(`${API_URL}/health`, { signal: AbortSignal.timeout(5000) })
      const d = await r.json()
      if (r.ok) {
        $('health-dot').className = 'dot ok'
        $('health-text').textContent = `Online`
        $('health-text').style.color = 'var(--yes)'
      } else {
        $('health-dot').className = 'dot err'
        $('health-text').textContent = `Error ${r.status}`
        $('health-text').style.color = 'var(--no)'
      }
    } catch {
      $('health-dot').className = 'dot err'
      $('health-text').textContent = 'Unreachable'
      $('health-text').style.color = 'var(--no)'
    }
  }

  // ── Quick prompts ─────────────────────────────
  function setQ(btn, text) {
    $('question').value = text
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    $('question').focus()
  }

  // ── Restore state ─────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('oracle_q')
    if (saved) $('question').value = saved

    $('question').addEventListener('input', () => {
      localStorage.setItem('oracle_q', $('question').value)
      document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'))
    })

    $('question').addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') runForecast()
    })

    checkHealth()
  })

  // ── Forecast ──────────────────────────────────
  async function runForecast() {
    const q = $('question').value.trim()
    if (!q) { $('question').focus(); return }

    $('run-btn').disabled = true
    $('spinner').style.display = 'block'
    $('run-label').textContent = 'Running…'
    $('empty-state').style.display = 'none'
    $('result-area').style.display = 'none'

    const t0 = Date.now()

    try {
      const res = await fetch(`${API_URL}/forecast`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
        body: JSON.stringify({ question: q, max_articles: parseInt($('max-articles').value) || 5 }),
        signal: AbortSignal.timeout(120000),
      })

      const elapsed = ((Date.now() - t0) / 1000).toFixed(1)

      if (!res.ok) {
        const txt = await res.text()
        throw new Error(`HTTP ${res.status}: ${txt}`)
      }

      const data = await res.json()
      renderResult(data, elapsed, q)

    } catch (e) {
      const msg = e.name === 'TimeoutError' ? 'Request timed out after 120s — the pipeline may be under load, try again.' : e.message
      $('result-area').innerHTML = `<div class="error-card">⚠ ${escHtml(msg)}</div>`
      $('result-area').style.display = 'block'
    } finally {
      $('run-btn').disabled = false
      $('spinner').style.display = 'none'
      $('run-label').textContent = 'Run Forecast'
    }
  }

  // ── Render ────────────────────────────────────
  function renderResult(data, elapsed, question) {
    const prob = Math.max(0, Math.min(1, (data.mean + 1) / 2))
    const probPct = Math.round(prob * 100)
    const ciLow  = Math.max(0, (data.ci_low  + 1) / 2)
    const ciHigh = Math.min(1, (data.ci_high + 1) / 2)

    const hue = prob * 120
    const color = `hsl(${hue}, 72%, 55%)`

    // Arc math: semicircle from 180° to 0°, cx=90 cy=90 r=70
    const ARC_LEN = Math.PI * 70  // ≈ 220
    const dashOffset = ARC_LEN * (1 - prob)

    let verdict = ''
    if (data.articles_used === 0) {
      verdict = '<span style="color:var(--muted)">No data — insufficient articles</span>'
    } else if (probPct >= 65) {
      verdict = `<span style="color:var(--yes)">Likely YES (${probPct}%)</span>`
    } else if (probPct <= 35) {
      verdict = `<span style="color:var(--no)">Likely NO (${100 - probPct}%)</span>`
    } else {
      verdict = `<span style="color:var(--warn)">Uncertain (${probPct}%)</span>`
    }

    const sourcesHtml = (data.sources || []).map(s => {
      const sp = (s.stance + 1) / 2
      const barColor = sp > .55 ? 'var(--yes)' : sp < .45 ? 'var(--no)' : 'var(--muted)'
      const credChip = s.credibility_weight > 1.05
        ? `<span class="chip hi">Trust ×${s.credibility_weight.toFixed(2)}</span>`
        : s.credibility_weight < 0.95
        ? `<span class="chip no">Trust ×${s.credibility_weight.toFixed(2)}</span>`
        : `<span class="chip">Trust ×${s.credibility_weight.toFixed(2)}</span>`
      const stanceChip = sp > .55
        ? `<span class="chip yes">YES ${Math.round(sp * 100)}%</span>`
        : sp < .45
        ? `<span class="chip no">NO ${Math.round((1-sp)*100)}%</span>`
        : `<span class="chip">Neutral</span>`
      const claims = s.claims.map(c => `<li>${escHtml(c)}</li>`).join('')
      const domain = (() => { try { return new URL(s.url).hostname.replace(/^www\./, '') } catch { return s.url } })()
      return `
        <div class="source-card">
          <div class="source-bar" style="background:${barColor}"></div>
          <div>
            <div class="source-name">${escHtml(s.source_name)}</div>
            <div class="source-url"><a href="${escHtml(s.url)}" target="_blank" rel="noopener">${escHtml(domain)}</a></div>
            ${claims ? `<ul class="source-claims">${claims}</ul>` : ''}
            <div class="source-chips">
              ${stanceChip}
              <span class="chip">Certainty ${Math.round(s.certainty * 100)}%</span>
              ${credChip}
            </div>
          </div>
        </div>`
    }).join('')

    const placeholderNotice = data.placeholder ? `
      <div class="notice warn">⚠ Pipeline stub — scores are placeholders. Real articles found but not processed.</div>
    ` : ''

    const noDataNotice = data.articles_used === 0 ? `
      <div class="notice info">ℹ No predictive articles found. Try rephrasing the question or increasing max articles.</div>
    ` : ''

    $('result-area').innerHTML = `
      ${placeholderNotice}
      ${noDataNotice}

      <div class="result-grid">
        <!-- Gauge -->
        <div class="card" style="text-align:center">
          <div class="card-label">Probability</div>
          <div class="gauge-wrap">
            <svg viewBox="0 0 180 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M 10 90 A 70 70 0 0 1 170 90"
                    stroke="#1C3452" stroke-width="12" stroke-linecap="round" fill="none"/>
              <path d="M 10 90 A 70 70 0 0 1 170 90"
                    stroke="${color}" stroke-width="12" stroke-linecap="round" fill="none"
                    stroke-dasharray="${ARC_LEN}" stroke-dashoffset="${dashOffset}"
                    style="transition: stroke-dashoffset .6s ease, stroke .6s ease"/>
            </svg>
            <div class="gauge-label">
              <div class="gauge-pct" style="color:${color}">${probPct}%</div>
              <div class="gauge-sub">probability YES</div>
            </div>
          </div>
          <div class="verdict">${verdict}</div>
        </div>

        <!-- Stats -->
        <div class="card">
          <div class="card-label">Details</div>

          <div class="stat-row">
            <span class="stat-key">Question</span>
            <span class="stat-val" style="font-size:.78rem;text-align:right;max-width:220px;word-break:break-word">${escHtml(question)}</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">Articles used</span>
            <span class="stat-val">${data.articles_used}</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">Raw stance</span>
            <span class="stat-val">${data.mean.toFixed(3)} <span style="font-weight:400;color:var(--muted)">± ${data.std.toFixed(3)}</span></span>
          </div>

          <div style="margin-top:.85rem">
            <div style="font-size:.72rem;color:var(--muted);margin-bottom:.35rem">95% Confidence Interval</div>
            <div class="ci-bar-track">
              <div class="ci-bar-fill" style="left:${ciLow*100}%;width:${(ciHigh-ciLow)*100}%"></div>
              <div class="ci-bar-point" style="left:${prob*100}%"></div>
            </div>
            <div class="ci-labels">
              <span>0%</span>
              <span style="color:var(--text-dim)">${Math.round(ciLow*100)}% – ${Math.round(ciHigh*100)}%</span>
              <span>100%</span>
            </div>
          </div>
        </div>
      </div>

      ${sourcesHtml ? `
        <div class="sources-header">Sources (${data.sources.length})</div>
        ${sourcesHtml}
      ` : ''}

      <div class="result-meta">
        <span>Completed in ${elapsed}s</span>
        <span>${new Date().toLocaleTimeString()}</span>
      </div>

      <details>
        <summary>Raw JSON</summary>
        <pre>${escHtml(JSON.stringify(data, null, 2))}</pre>
      </details>
    `

    $('result-area').style.display = 'block'
    $('content').scrollTop = 0
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  }
</script>
</body>
</html>
